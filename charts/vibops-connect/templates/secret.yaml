{{- if not .Values.vibops.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibops-connect.fullname" . }}-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops-connect.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.vibops.token | required "vibops.token is required when existingSecret is not set" | quote }}
{{- end }}
