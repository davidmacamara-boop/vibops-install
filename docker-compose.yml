services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: vibops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vibops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibops -d vibops_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibops_net

  redis:
    image: redis:7-alpine
    container_name: vibops_redis
    restart: unless-stopped
    # Security note: TLS between services is delegated to the network layer.
    # Redis is bound exclusively to the internal Docker bridge network (vibops_net)
    # and is not internet-exposed. This is an accepted risk documented in the
    # VibOps Risk Register (R-011). Authentication is enforced via --requirepass.
    command: redis-server --requirepass ${REDIS_PASSWORD:-vibops-dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vibops-dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibops_net

  # ─── Execution Engine (core/) ─────────────────────────────────────────────

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: vibops_core
    restart: unless-stopped
    command: ["api"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
    volumes:
      - ${HOME}/.kube:/root/.kube:ro  # kubeconfig host — tous les contextes visibles
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vibops_net

  worker:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: vibops_worker
    restart: unless-stopped
    command: ["worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
      OLLAMA_URL: http://ollama:11434
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      SLURM_DEMO_MODE: ${SLURM_DEMO_MODE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube         # kubeconfig host — setup_kubeconfig écrit ici
    ports:
      - "8080:8080"   # kubectl port-forward (ex: open-webui)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibops_net

  # Celery Beat — planificateur de tâches (évalue les triggers toutes les 60s)
  beat:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: vibops_beat
    restart: unless-stopped
    command: ["beat"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
    depends_on:
      - redis
      - worker
    networks:
      - vibops_net

  # ─── Backup PostgreSQL quotidien ─────────────────────────────────────────
  # Lance un pg_dump compressé chaque jour à 02:00 UTC.
  # Les dumps sont stockés dans le volume vibops_backups (hôte : ./backups/).
  # Rotation automatique : les fichiers de plus de 30 jours sont supprimés.
  backup:
    image: postgres:16-alpine
    container_name: vibops_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backups:/backups
    entrypoint: >
      sh -c '
        while true; do
          STAMP=$$(date -u +%Y-%m-%d);
          DEST=/backups/vibops_$${STAMP}.sql.gz;
          echo "[backup] $$(date -u +%FT%TZ) → $$DEST";
          pg_dump -h postgres -U vibops -d vibops_db | gzip > $$DEST \
            && echo "[backup] done" \
            || echo "[backup] FAILED";
          find /backups -name "vibops_*.sql.gz" -mtime +30 -delete;
          sleep 86400;
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Agent Claude (agent/) ────────────────────────────────────────────────

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: vibops_agent
    restart: unless-stopped
    env_file: .env
    environment:
      CORE_API_URL: http://core:8000
    ports:
      - "8001:8001"
    volumes:
      - agent_training_data:/app/data/training
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Console web (console/) ──────────────────────────────────────────────

  console:
    build:
      context: .
      dockerfile: console/Dockerfile
    container_name: vibops_console
    restart: unless-stopped
    env_file: .env
    environment:
      CORE_API_URL: http://core:8000
      AGENT_API_URL: http://agent:8001
      OLLAMA_URL: http://ollama:11434
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      # URL publique de Grafana — accessible depuis le navigateur (pas depuis Docker)
      # Vide si le profil observability n'est pas activé
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:-}
    volumes:
      - console_data:/data
    ports:
      - "8003:8003"
    depends_on:
      core:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - vibops_net

  # ─── Ollama — runtime LLM local ──────────────────────────────────────────
  # GPU : décommenter le bloc "deploy" si tu as une carte NVIDIA
  ollama:
    image: ollama/ollama
    container_name: vibops_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - vibops_net

  # ─── LLM Inference Proxy ──────────────────────────────────────────────────
  # Transparent OpenAI-compatible proxy that captures inference metrics
  # per agent for FinOps attribution. Agents point here instead of vLLM/Ollama.
  llm-proxy:
    build:
      context: llm-proxy
    container_name: vibops_llm_proxy
    restart: unless-stopped
    environment:
      CORE_API_URL: http://core:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      DEFAULT_BACKEND_URL: http://ollama:11434
    ports:
      - "8004:8004"
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Connect Gateway (optionnel — profil connect) ────────────────────────
  # Déployé chez un CSP ou client final pour gérer des clusters distants.
  # Utiliser plutôt : docker build -f connect/Dockerfile -t vibops/connect .
  # et déployer sur le serveur du CSP avec les variables ci-dessous.
  connect:
    build:
      context: .
      dockerfile: connect/Dockerfile
    container_name: vibops_connect
    environment:
      VIBOPS_CORE_URL: http://core:8000
      VIBOPS_GATEWAY_ID: ${CONNECT_GATEWAY_ID:-}
      VIBOPS_TOKEN: ${CONNECT_TOKEN:-}
      VIBOPS_POLL_INTERVAL: "15"
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net
    profiles:
      - connect

  # ─── Observabilité — Prometheus + Grafana (toujours actifs) ─────────────
  # Prometheus scrape core:8000/metrics, agent:8001/metrics, gpu-simulator:9400/metrics
  # Grafana disponible sur http://localhost:3000 (admin / ${GRAFANA_PASSWORD:-vibops})
  # Pour désactiver en prod légère : docker compose --profile no-observability up (futur)

  gpu-simulator:
    build:
      context: .
      dockerfile: tools/gpu-simulator/Dockerfile
    container_name: vibops_gpu_simulator
    restart: unless-stopped
    ports:
      - "9400:9400"
    networks:
      - vibops_net

  prometheus:
    image: prom/prometheus:latest
    container_name: vibops_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - vibops_net

  grafana:
    image: grafana/grafana:latest
    container_name: vibops_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-vibops}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - vibops_net

  # ─── Gateway OpenAI-compatible (gateway/) ────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: vibops_gateway
    environment:
      AGENT_API_URL: http://agent:8001
    ports:
      - "8002:8002"
    depends_on:
      - agent
    networks:
      - vibops_net

# ─── Volumes & Réseau ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  ollama_data:
  console_data:
  agent_training_data:   # dataset JSONL — persisté entre redémarrages
  prometheus_data:
  grafana_data:
  backups:               # pg_dump quotidiens — vibops_YYYY-MM-DD.sql.gz, 30j de rétention
  # kubeconfig: remplacé par bind mount ${HOME}/.kube (voir core et worker volumes)

networks:
  vibops_net:
    driver: bridge
