{{- if and .Values.imageCredentials.enabled .Values.imageCredentials.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibops.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}"
    .Values.imageCredentials.registry
    .Values.imageCredentials.username
    .Values.imageCredentials.password
    (printf "%s:%s" .Values.imageCredentials.username .Values.imageCredentials.password | b64enc)
    | b64enc }}
{{- end }}
