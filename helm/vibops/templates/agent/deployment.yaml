{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibops.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "vibops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      {{- include "vibops.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "vibops.fullname" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.images.agent.repository }}:{{ .Values.images.agent.tag }}"
          imagePullPolicy: {{ .Values.images.agent.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - secretRef:
                name: {{ include "vibops.fullname" . }}-agent
          env:
            - name: TRAINING_DATA_DIR
              value: /app/data/training
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          {{- if .Values.agent.persistence.enabled }}
          volumeMounts:
            - name: training-data
              mountPath: /app/data/training
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if .Values.agent.persistence.enabled }}
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: {{ include "vibops.fullname" . }}-agent-training
      {{- end }}
{{- end }}
