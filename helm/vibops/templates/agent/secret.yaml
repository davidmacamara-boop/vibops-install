apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibops.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.agent.secret.anthropicApiKey | quote }}
  JWT_SECRET_KEY: {{ .Values.agent.secret.jwtSecretKey | quote }}
  CORE_API_URL: {{ printf "http://%s-core:%d" (include "vibops.fullname" .) (.Values.core.service.port | int) | quote }}
