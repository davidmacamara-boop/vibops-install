{{- if .Values.autoscaling.enabled }}
# ── HorizontalPodAutoscaler — core ────────────────────────────────────────────
{{- if .Values.core.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vibops.fullname" . }}-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vibops.fullname" . }}-core
  minReplicas: {{ .Values.autoscaling.core.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.core.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.core.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.core.targetMemoryUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # attendre 5 min avant de scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
{{- end }}
---
# ── HorizontalPodAutoscaler — agent ───────────────────────────────────────────
{{- if .Values.agent.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vibops.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vibops.fullname" . }}-agent
  minReplicas: {{ .Values.autoscaling.agent.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.agent.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.agent.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min — l'agent garde du contexte en mémoire
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}
{{- end }}
