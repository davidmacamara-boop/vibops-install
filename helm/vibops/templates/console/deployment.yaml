{{- if .Values.console.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibops.fullname" . }}-console
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibops.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        {{- include "vibops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      {{- include "vibops.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: console
          image: "{{ .Values.images.console.repository }}:{{ .Values.images.console.tag }}"
          imagePullPolicy: {{ .Values.images.console.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGENT_URL
              value: {{ printf "http://%s-agent:%d" (include "vibops.fullname" .) (.Values.agent.service.port | int) | quote }}
            - name: CORE_URL
              value: {{ printf "http://%s-core:%d" (include "vibops.fullname" .) (.Values.core.service.port | int) | quote }}
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
